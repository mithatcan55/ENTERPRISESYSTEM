name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EnterpriseSystem.sln

      - name: Build
        run: dotnet build EnterpriseSystem.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test EnterpriseSystem.sln --configuration Release --no-build --verbosity normal
